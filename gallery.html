<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AVIF Gallery</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #ccc;
      font-family: Verdana, Arial, sans-serif;
      font-size: 12px;
    }
    .topbar {
      background: #111;
      border-bottom: 2px solid #333;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: bold;
      color: #eee;
    }
    .container {
      max-width: 1000px;
      margin: 16px auto;
      background: #0a0a0a;
      border: 1px solid #333;
      padding: 12px;
    }
    h1 {
      font-size: 15px;
      color: #fff;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
      margin-top: 0;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .item {
      background: #151515;
      border: 1px solid #2a2a2a;
      padding: 6px;
      text-align: center;
    }
    .item img { max-width: 100%; border: 1px solid #333; }
    .item p { font-size: 11px; color: #6cf; word-break: break-all; margin: 4px 0 0; }
    .item .size { font-size: 10px; color: #888; margin-top: 2px; }
    a { color: #6cf; }
  </style>
</head>
<body>
  <div class="topbar">AVIF Gallery</div>
  <div class="container">
    <h1>Image List</h1>
    <div class="grid" id="gallery">Loading...</div>
  </div>

  <script>
    const owner = "zvf1";
    const repo = "img";
    const path = "avif";

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)
      .then(res => res.json())
      .then(files => {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";
        files
          .filter(f => f.name.toLowerCase().endsWith(".avif"))
          .forEach(f => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <img src="https://zvf1.github.io/img/avif/${f.name}" loading="lazy">
              <p>${f.name}</p>
              <p class="size">${formatSize(f.size)}</p>
            `;
            gallery.appendChild(div);
          });
      });
  </script>
</body>
</html>
