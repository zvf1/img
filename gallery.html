<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>lz4 Gallery</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }
    body {
      font-family: sans-serif;
      color: #eee;
      padding: 20px;
      background-image: url("https://zvf1.github.io/img/bg.avif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      box-sizing: border-box;
    }
    h1 {
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .item {
      background: rgba(20, 20, 20, 0.75);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      backdrop-filter: blur(2px);
    }
    .item img { max-width: 100%; border-radius: 4px; }
    .item p { font-size: 12px; word-break: break-all; margin: 6px 0 0; }
    .item .size { font-size: 11px; color: #ccc; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>lz4 Gallery</h1>
  <div class="grid" id="gallery">Loading...</div>

  <script>
    const owner = "zvf1";
    const repo = "img";
    const path = "avif";

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)
      .then(res => res.json())
      .then(files => {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";
        files
          .filter(f => f.name.toLowerCase().endsWith(".avif"))
          .forEach(f => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <img src="https://zvf1.github.io/img/avif/${f.name}" loading="lazy">
              <p>${f.name}</p>
              <p class="size">${formatSize(f.size)}</p>
            `;
            gallery.appendChild(div);
          });
      });
  </script>
</body>
</html>
